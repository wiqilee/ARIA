version: "3.9"

services:
  # ── Rust MCP Server ──────────────────────────────────────
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - RUST_LOG=info
      - GOOGLE_CLOUD_PROJECT=${GCP_PROJECT_ID}
      - VERTEXAI_LOCATION=${VERTEXAI_LOCATION:-asia-southeast2}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-pro}
      - OPENFDA_API_KEY=${OPENFDA_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Python A2A Agent ─────────────────────────────────────
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - MCP_SERVER_URL=http://mcp-server:8080
      - GOOGLE_CLOUD_PROJECT=${GCP_PROJECT_ID}
      - VERTEXAI_LOCATION=${VERTEXAI_LOCATION:-asia-southeast2}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-pro}
    depends_on:
      mcp-server:
        condition: service_healthy

  # ── Next.js Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_AGENT_URL=http://localhost:8000
    depends_on:
      - agent
