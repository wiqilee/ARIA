name: Deploy MCP Server

on:
  push:
    branches: [main]
    paths:
      - "mcp-server/**"
      - ".github/workflows/deploy-mcp-server.yml"
  workflow_dispatch: # allow manual trigger

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-southeast2
  # Vertex AI must be called from us-central1 — Gemini 2.5 Pro is not yet
  # available in asia-southeast2. Cloud Run service stays in asia-southeast2
  # for low latency to Southeast Asian users; the LLM call is the only thing
  # that crosses regions.
  VERTEX_LOCATION: us-central1
  SERVICE_NAME: aria-mcp-server
  ARTIFACT_REPO: aria-images

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for workload identity federation
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build & push Docker image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" -t "${IMAGE%:*}:latest" mcp-server/
          docker push "$IMAGE"
          docker push "${IMAGE%:*}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "LLM_MODE=vertex_ai,GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT }},VERTEXAI_LOCATION=${{ env.VERTEX_LOCATION }},GEMINI_MODEL=gemini-2.5-pro,FHIR_BASE_URL=https://hapi.fhir.org/baseR4" \
            --set-secrets "OPENFDA_API_KEY=openfda-api-key:latest"

      - name: Output service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.GCP_REGION }} --format='value(status.url)')
          echo "MCP Server deployed to: $URL"
          echo "MCP_SERVER_URL=$URL" >> $GITHUB_OUTPUT