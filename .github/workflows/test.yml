name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ==========================================================
  # Rust MCP Server tests
  # ==========================================================
  test-mcp-server:
    name: Rust (MCP Server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mcp-server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('mcp-server/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

  # ==========================================================
  # Python A2A Agent tests
  # ==========================================================
  test-agent:
    name: Python (A2A Agent)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with ruff
        run: ruff check src/ || echo "Lint warnings (non-blocking)"

      - name: Test
        run: |
          if [ -d tests ]; then
            pytest tests/ -v
          else
            echo "No tests directory yet; skipping"
          fi

  # ==========================================================
  # Next.js Frontend tests
  # ==========================================================
  test-frontend:
    name: Next.js (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || echo "Lint warnings (non-blocking)"

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
