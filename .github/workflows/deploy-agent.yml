name: Deploy A2A Agent

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/deploy-agent.yml"
  workflow_dispatch:

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-southeast2
  SERVICE_NAME: aria-a2a-agent
  ARTIFACT_REPO: aria-images

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build & push Docker image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" -t "${IMAGE%:*}:latest" agent/
          docker push "$IMAGE"
          docker push "${IMAGE%:*}:latest"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMAGE" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 5 \
            --timeout 300 \
            --port 8000 \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT }},VERTEXAI_LOCATION=${{ env.GCP_REGION }},GEMINI_MODEL=gemini-2.5-pro,MCP_SERVER_URL=${{ secrets.MCP_SERVER_URL }},PUBLIC_AGENT_URL=${{ secrets.PUBLIC_AGENT_URL }}" \
            --set-secrets "OPENFDA_API_KEY=openfda-api-key:latest"

      - name: Output service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "A2A Agent deployed to $URL"
          echo "AGENT_URL=$URL" >> $GITHUB_ENV

      - name: Health check
        run: |
          echo "Waiting 10s for service to be ready..."
          sleep 10
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.AGENT_URL }}/health" || echo "000")
          if [ "$HEALTH" = "200" ]; then
            echo "Health check passed"
          else
            echo "Health check returned HTTP $HEALTH"
            exit 1
          fi